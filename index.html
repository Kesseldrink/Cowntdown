<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Countdown</title>
    
    <!-- Das Icon (Favicon) für den Browser-Tab (Sanduhr) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #12121c); 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); 
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #7289da;
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.5);
        }

        /* --- Styles für das Setup --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #99aab5;
            font-weight: bold;
        }

        input[type="text"], input[type="date"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #7289da;
            background-color: #2c2f33;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* Verhindert, dass das Kalender-Icon in einigen Browsern schwarz ist */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        button {
            background-color: #5865f2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
        }

        /* --- Styles für den Countdown --- */
        #countdown-screen {
            display: none; /* Startet versteckt */
        }

        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .number {
            font-size: 50px;
            font-weight: bold;
            background: #2c2f33;
            padding: 15px 10px;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            color: #57f287; 
            text-shadow: 0 0 10px rgba(87, 242, 135, 0.4);
        }

        .label {
            margin-top: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #99aab5;
        }

        #finished-message {
            display: none;
            font-size: 40px;
            font-weight: bold;
            color: #ed4245;
            text-shadow: 0 0 20px rgba(237, 66, 69, 0.6);
            animation: popIn 0.5s ease-out;
            margin-top: 20px;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsive Anpassung für Handys */
        @media (max-width: 600px) {
            .countdown { gap: 10px; }
            .number { font-size: 30px; padding: 10px; }
            .label { font-size: 10px; }
        }
    </style>
</head>
<body>

    <!-- BEREICH 1: Setup (Einstellungen) -->
    <div class="container" id="setup-screen">
        <h1>Neuen Timer stellen ⏳</h1>
        
        <div class="input-group">
            <label for="event-title">Event-Name (Optional):</label>
            <input type="text" id="event-title" placeholder="z.B. Pizza ist fertig!">
        </div>

        <div class="input-group">
            <label for="event-date">Datum:</label>
            <input type="date" id="event-date">
        </div>

        <div class="input-group">
            <label for="event-time">Uhrzeit:</label>
            <input type="time" id="event-time">
        </div>

        <button onclick="startCountdown()">Countdown starten 🚀</button>
    </div>


    <!-- BEREICH 2: Der laufende Countdown -->
    <div class="container" id="countdown-screen">
        <h1 id="display-title">Warten auf Event...</h1>
        
        <div class="countdown" id="countdown-timer">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Tage</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Stunden</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minuten</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Sekunden</span>
            </div>
        </div>

        <div id="finished-message">ES IST SOWEIT! 🎉</div>
        
        <!-- Ein Button, um die Seite neu zu laden und einen neuen Timer zu stellen -->
        <button id="reset-btn" style="display: none; margin-top: 30px;" onclick="location.reload()">Neuen Timer stellen</button>
    </div>


    <script>
        let timerInterval;

        // --- Standardwerte beim Laden der Seite setzen (+1 Stunde) ---
        window.onload = function() {
            const now = new Date();
            now.setHours(now.getHours() + 1); // 1 Stunde auf die aktuelle Zeit rechnen

            // Datum formatieren (JJJJ-MM-TT) für das input-Feld
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('event-date').value = `${year}-${month}-${day}`;

            // Uhrzeit formatieren (HH:MM) für das input-Feld
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('event-time').value = `${hours}:${minutes}`;
        };

        // --- Countdown starten ---
        function startCountdown() {
            // Werte aus den Eingabefeldern holen
            const titleInput = document.getElementById('event-title').value;
            const dateInput = document.getElementById('event-date').value;
            const timeInput = document.getElementById('event-time').value;

            // Prüfen, ob Datum und Uhrzeit ausgefüllt sind
            if (!dateInput || !timeInput) {
                alert("Bitte wähle ein Datum und eine Uhrzeit aus!");
                return;
            }

            // Ziel-Datum aus den Inputs erstellen
            const targetDate = new Date(`${dateInput}T${timeInput}:00`).getTime();

            // Titel anpassen (wenn leer, nimm Standardtext)
            document.getElementById('display-title').innerText = titleInput ? titleInput : "Hype Countdown! 🚀";

            // Bildschirme wechseln (Setup ausblenden, Timer einblenden)
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('countdown-screen').style.display = 'block';

            // Timer-Logik
            timerInterval = setInterval(function() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // Zahlen updaten
                document.getElementById("days").innerText = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

                // Wenn die Zeit abgelaufen ist
                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById("countdown-timer").style.display = "none";
                    document.getElementById("finished-message").style.display = "block";
                    document.getElementById("reset-btn").style.display = "block"; // Reset Button anzeigen
                }
            }, 1000);
        }
    </script>

</body>
</html>
